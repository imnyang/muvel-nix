name: Update Muvel

on:
  schedule:
    # 03:23 Asia/Seoul every day.
    - cron: "23 18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-muvel
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Update release sources
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/update.sh

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- sources.json; then
            echo "changed=false" >>"$GITHUB_OUTPUT"
          else
            echo "changed=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Validate update
        if: steps.changes.outputs.changed == 'true'
        run: |
          nix flake check --all-systems --no-build
          nix build

      - name: Create or update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          version="$(jq --raw-output '.version' sources.json)"
          branch="automation/update-muvel"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git switch --create "$branch"
          git add sources.json
          git commit -m "muvel: update to $version"
          git push --force-with-lease origin "HEAD:$branch"

          if gh pr view "$branch" >/dev/null 2>&1; then
            gh pr edit "$branch" \
              --title "muvel: update to $version" \
              --body "Automated Muvel release update. All source hashes were refreshed and the flake was validated."
          else
            gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$branch" \
              --title "muvel: update to $version" \
              --body "Automated Muvel release update. All source hashes were refreshed and the flake was validated."
          fi
