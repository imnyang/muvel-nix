name: Update flake inputs

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-flake-inputs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Update flake inputs
        run: nix flake update

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >>"$GITHUB_OUTPUT"
          else
            echo "changed=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Validate update
        if: steps.changes.outputs.changed == 'true'
        run: |
          nix flake check --all-systems --no-build
          nix build

      - name: Create or update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          branch="automation/update-flake-lock"
          title="flake: update inputs"
          body="Automated flake input update. The updated lock file passed evaluation on all supported systems and a Linux build."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git switch --create "$branch"
          git add flake.lock
          git commit -m "$title"
          git push --force-with-lease origin "HEAD:$branch"

          if gh pr view "$branch" >/dev/null 2>&1; then
            gh pr edit "$branch" --title "$title" --body "$body"
          else
            gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$branch" \
              --title "$title" \
              --body "$body"
          fi
